version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dev-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    ignore:
      # TODO: remove once typescript-eslint supports TS 6.x
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
      # Must stay in sync with engines.vscode in packages/vscode/package.json
      - dependency-name: "@types/vscode"
